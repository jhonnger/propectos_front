name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-e2e:
    name: Build & e2e (Node 20)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Install dependencies
        run: npm ci

      # Lint gate del frontend: type-check estricto (no hay ESLint configurado;
      # ver PLAN_DESARROLLO.md 3.5 — ESLint queda como backlog para evitar churn).
      - name: Type-check
        run: npx tsc -p tsconfig.app.json --noEmit

      - name: Production build
        run: npm run build

      - name: Install Playwright (Chromium)
        run: npx playwright install --with-deps chromium

      # Playwright levanta la app en :4300 (webServer) con harness de mocks de red.
      - name: E2E (Playwright)
        run: npm test

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          if-no-files-found: ignore
